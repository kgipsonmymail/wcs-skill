功能: 状态展开式加载
概述: AI 读取项目时，先识别状态，按状态决定读哪个 doc

关键对象:
  - 文件: docs/project_index.yaml
    作用: 唯一开场必读，项目概览
    关键函数/类型:
      - task_contexts        # 16 种任务类型定义
      - trigger_keywords    # 状态触发词
  - 文件: docs/task_states.md
    作用: 15 种状态触发规则
    关键函数/类型:
      - 状态识别逻辑       # 根据 trigger_keywords 匹配状态
  - 文件: docs/workflow.md
    作用: 各状态对应的文档读取顺序，Bug 阶段有标准 4 步排查流程
    关键函数/类型:
      - Bug 阶段            # 第一步定位文件/第二步定位代码/第三步跨模块关联/第四步精准修改
  - 文件: wcs-cn/SKILL.md
    作用: 部署版 skill 主文件，AI 实际加载
    关键函数/类型:
      - 状态识别章节        # SKILL.md 中定义状态加载逻辑

已知坑:
  - 调试时间: N/A（机制设计问题）
    现象: 一次性塞入所有文档，上下文过载
    根因: 没有状态识别机制，随机加载
    涉及文件: [SKILL.md 旧版]
